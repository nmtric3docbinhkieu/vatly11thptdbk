<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vật lí 11 - Định luật Coulomb</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body { 
            background: #f1f5f9; 
            color: #1e293b; 
            font-family: 'Nunito', sans-serif; 
            margin: 0; 
            height: auto;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .glass-panel {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .stat-card {
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        /* Thanh trượt hiện đại */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 1rem;
            outline: none;
            margin: 16px 0;
            transition: all 0.3s ease;
        }

        .custom-slider:hover {
            background: #cbd5e1;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }

        .custom-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        #canvas-wrap {
            width: 100%;
            height: 320px;
            background: white;
            border-radius: 1rem;
            position: relative;
            touch-action: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        /* Menu chọn hiện đại */
        select {
            border: 2px solid #e2e8f0 !important;
            background: white !important;
            padding: 12px 16px !important;
            font-weight: 600 !important;
            font-size: 15px !important;
            border-radius: 0.75rem !important;
            transition: all 0.3s ease !important;
            cursor: pointer !important;
        }

        select:hover {
            border-color: #3b82f6 !important;
        }

        select:focus {
            outline: none !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        }

        .label-text { 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 13px; 
            color: #64748b; 
            letter-spacing: 0.05em;
        }
        .footer-space { height: 120px; } /* Tạo khoảng trống cuối trang */
    </style>
</head>
<body class="p-4">

    <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Định luật Coulomb</h1>
        <p class="text-slate-500 font-semibold">Thí nghiệm ảo - Chương 3: Điện trường</p>
    </header>

    <div class="glass-panel overflow-hidden mb-6">
        <div id="canvas-wrap"></div>
        <div class="bg-blue-50 border-t border-blue-100 p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-ruler text-blue-600"></i>
                <span class="font-semibold text-slate-700">Khoảng cách: <span id="dist-text" class="text-blue-600 font-bold">0</span> cm</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-bolt text-yellow-500"></i>
                <span class="font-semibold text-slate-700">Lực F: <span id="f-val" class="text-blue-600 font-bold">0.00</span> N</span>
            </div>
        </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2">
        <div class="glass-panel stat-card p-6 border-l-4 border-red-500">
            <div class="flex justify-between items-center mb-4">
                <label class="label-text flex items-center gap-2">
                    <i class="fas fa-plus-circle text-red-500"></i>
                    Điện tích q₁ (Đỏ)
                </label>
                <span class="text-2xl font-bold text-red-600" id="q1t">5 µC</span>
            </div>
            <input type="range" id="q1s" min="-10" max="10" step="1" value="5" class="custom-slider">
        </div>

        <div class="glass-panel stat-card p-6 border-l-4 border-blue-500">
            <div class="flex justify-between items-center mb-4">
                <label class="label-text flex items-center gap-2">
                    <i class="fas fa-minus-circle text-blue-500"></i>
                    Điện tích q₂ (Xanh)
                </label>
                <span class="text-2xl font-bold text-blue-600" id="q2t">-5 µC</span>
            </div>
            <input type="range" id="q2s" min="-10" max="10" step="1" value="-5" class="custom-slider">
        </div>
    </div>

    <div class="glass-panel p-6 mt-6">
        <label class="label-text block mb-3 flex items-center gap-2">
            <i class="fas fa-flask text-green-600"></i>
            Môi trường điện môi (ε)
        </label>
        <select id="eps" class="w-full">
            <option value="1">Không khí / Chân không (ε=1)</option>
            <option value="2">Dầu hỏa (ε=2)</option>
            <option value="2.1">Parafin (ε=2.1)</option>
            <option value="3">Cao su (ε=3)</option>
            <option value="6">Mica (ε=6)</option>
            <option value="7">Thủy tinh (ε=7)</option>
            <option value="81">Nước tinh khiết (ε=81)</option>
        </select>
    </div>

    <div class="footer-space"></div>

<script>
    let q1, q2, dragging = null, audioCtx;
    const k = 9e9;

    function playTick() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(1000, audioCtx.currentTime);
        g.gain.setValueAtTime(0.01, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.04);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.04);
    }

    function setup() {
        const wrap = document.getElementById('canvas-wrap');
        let cnv = createCanvas(wrap.offsetWidth, wrap.offsetHeight);
        cnv.parent('canvas-wrap');
        q1 = { x: width * 0.25, y: height / 2, val: 5 };
        q2 = { x: width * 0.75, y: height / 2, val: -5 };

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => {
                document.getElementById('q1t').innerText = document.getElementById('q1s').value + " µC";
                document.getElementById('q2t').innerText = document.getElementById('q2s').value + " µC";
                playTick();
            });
        });
    }

    function draw() {
        background(255);
        q1.val = parseFloat(document.getElementById('q1s').value);
        q2.val = parseFloat(document.getElementById('q2s').value);
        let ep = parseFloat(document.getElementById('eps').value);

        let dPx = dist(q1.x, q1.y, q2.x, q2.y);
        let r_met = dPx / 4000; 
        let r_cm = (dPx / 10).toFixed(1);
        document.getElementById('dist-text').innerText = r_cm;

        let F = k * Math.abs(q1.val * q2.val * 1e-12) / (ep * r_met * r_met);
        if (isNaN(F) || !isFinite(F)) F = 0;
        document.getElementById('f-val').innerText = F.toFixed(4);

        // Lưới mờ
        stroke(240); strokeWeight(1);
        for(let i=0; i<width; i+=40) line(i,0,i,height);
        for(let i=0; i<height; i+=40) line(0,i,width,i);

        // Vector lực - Cải tiến độ dài linh hoạt
        let isAttractive = (q1.val * q2.val < 0);
        drawForceVector(q1, q2, isAttractive, F);
        drawForceVector(q2, q1, isAttractive, F);

        drawCharge(q1);
        drawCharge(q2);
    }

    function drawCharge(q) {
        push();
        let col = q.val > 0 ? color(239, 68, 68) : (q.val < 0 ? color(37, 99, 235) : color(150));
        stroke(0); strokeWeight(3); fill(col);
        ellipse(q.x, q.y, 50);
        fill(255, 120); noStroke(); ellipse(q.x-10, q.y-10, 15, 15);
        fill(255); textAlign(CENTER, CENTER); textStyle(BOLD); textSize(26);
        text(q.val > 0 ? "+" : (q.val < 0 ? "-" : "0"), q.x, q.y + 2);
        pop();
    }

    function drawForceVector(from, to, attractive, val) {
        if (val < 0.0001 || q1.val === 0 || q2.val === 0) return;
        let angle = atan2(to.y - from.y, to.x - from.x);
        if (!attractive) angle += PI;

        // Độ dài mũi tên tỉ lệ với căn bậc hai của lực để phản ánh đúng hơn
        let maxForce = 10; // Giả định lực tối đa 10N
        let normalizedForce = constrain(val / maxForce, 0, 1);
        let len = map(sqrt(normalizedForce), 0, 1, 20, 150);

        push();
        translate(from.x, from.y); rotate(angle);
        stroke(0); strokeWeight(7); line(25, 0, 25 + len, 0);
        stroke(attractive ? '#22c55e' : '#f97316'); strokeWeight(4); line(25, 0, 25 + len, 0);
        fill(0); noStroke(); triangle(25+len+12, 0, 25+len, -10, 25+len, 10);
        pop();
    }

    function handleStart(x, y) {
        if(dist(x, y, q1.x, q1.y) < 40) dragging = q1;
        else if(dist(x, y, q2.x, q2.y) < 40) dragging = q2;
    }
    function handleMove(x, y) {
        if(dragging) {
            dragging.x = constrain(x, 30, width - 30);
            dragging.y = constrain(y, 30, height - 30);
        }
    }

    function mousePressed() { if(mouseY < 320) handleStart(mouseX, mouseY); }
    function mouseDragged() { handleMove(mouseX, mouseY); }
    function mouseReleased() { dragging = null; }

    function touchStarted() {
        if(touches.length > 0) {
            let tx = touches[0].x, ty = touches[0].y;
            if(ty < 320) {
                handleStart(tx, ty);
                if(dragging) return false;
            }
        }
    }
    function touchMoved() {
        if(dragging && touches.length > 0) {
            handleMove(touches[0].x, touches[0].y);
            return false;
        }
    }
    function touchEnded() { dragging = null; }
    function windowResized() {
        const wrap = document.getElementById('canvas-wrap');
        resizeCanvas(wrap.offsetWidth, wrap.offsetHeight);
    }
</script>
</body>
</html>
