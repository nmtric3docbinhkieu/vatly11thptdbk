<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vật lí 11 - Thí nghiệm nhiễm điện</title>
    
    <!-- Scripts và thư viện -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: #f1f5f9; 
            color: #1e293b;
            margin: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .glass-panel { 
            background: white; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: all 0.3s ease;
        }
        
        .stat-card { 
            transition: all 0.3s ease; 
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
        }
        
        .tab-btn {
            padding: 0.6rem 0.8rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: white;
            color: #475569;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            font-size: 0.8rem;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            flex: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }
        
        .tab-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        
        .tab-btn:not(.active):hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        
        .tab-btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        
        canvas { 
            touch-action: none; 
            border-radius: 1rem;
            display: block;
            width: 100%;
            height: 100%;
            background: white;
        }
        
        .footer-space { height: 80px; }
        
        .progress-bar {
            background: #e2e8f0;
            border-radius: 9999px;
            height: 0.5rem;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #3b82f6;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        
        .reset-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.75rem;
            color: #ef4444;
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .reset-btn:hover {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .reset-btn:active {
            transform: scale(0.97);
        }
        
        .status-led {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background: #cbd5e1;
            transition: all 0.3s ease;
        }
        
        .status-led.active {
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
        }
        
        /* Mobile optimizations */
        @media (max-width: 640px) {
            .tab-btn {
                padding: 0.5rem 0.5rem;
                font-size: 0.7rem;
            }
            
            .glass-panel {
                border-radius: 1rem;
            }
            
            .stat-card {
                transform: none !important;
            }
            
            .footer-space {
                height: 60px;
            }
        }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col">
    
    <!-- Header -->
    <header class="mb-4 text-center">
        <h1 class="text-xl md:text-3xl font-bold text-slate-800 mb-1">Sự nhiễm điện</h1>
        <p class="text-slate-500 font-semibold text-xs md:text-sm">Thí nghiệm ảo - Vật lí 11</p>
    </header>
    
    <!-- Tabs -->
    <div class="flex gap-1 md:gap-2 mb-4">
        <button id="tab1" class="tab-btn active">
            <i class="fas fa-hand-sparkles text-xs"></i>
            <span>Cọ xát</span>
        </button>
        <button id="tab2" class="tab-btn">
            <i class="fas fa-hand-pointer text-xs"></i>
            <span>Tiếp xúc</span>
        </button>
        <button id="tab3" class="tab-btn">
            <i class="fas fa-magnet text-xs"></i>
            <span>Hưởng ứng</span>
        </button>
    </div>
    
    <!-- Canvas container -->
    <div class="glass-panel p-3 md:p-4 mb-4">
        <div id="canvas-parent" class="w-full aspect-[3/4] md:aspect-[16/9] relative overflow-hidden rounded-xl bg-white">
            <!-- Status overlay -->
            <div class="absolute top-2 left-2 md:top-4 md:left-4 z-10 flex items-center gap-1 md:gap-2 bg-white/90 backdrop-blur-sm px-2 py-1 md:px-3 md:py-2 rounded-full border border-slate-200 shadow-sm">
                <div id="status-led" class="status-led w-1.5 h-1.5 md:w-2 md:h-2"></div>
                <span id="status-text" class="text-[10px] md:text-xs font-semibold text-slate-500 uppercase tracking-wider">Trung hòa</span>
            </div>
        </div>
    </div>
    
    <!-- Controls -->
    <div class="grid gap-3 md:gap-4 grid-cols-2 mb-4">
        <!-- Charge meter -->
        <div class="glass-panel stat-card p-3 md:p-5 border-l-4 border-blue-500">
            <div class="flex items-center justify-between mb-2">
                <label class="label-text flex items-center gap-1 text-[10px] md:text-xs">
                    <i class="fas fa-bolt text-blue-500 text-xs"></i>
                    Điện tích
                </label>
                <span id="charge-percent" class="text-xs md:text-sm font-bold text-blue-600">0%</span>
            </div>
            <div class="progress-bar">
                <div id="charge-fill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Reset button -->
        <div class="glass-panel stat-card p-3 md:p-5 flex items-center justify-between">
            <div class="flex items-center gap-1">
                <i class="fas fa-info-circle text-slate-400 text-xs"></i>
                <span class="text-[10px] md:text-sm text-slate-600">Làm mới</span>
            </div>
            <button id="resetBtn" class="reset-btn px-3 py-1.5 md:px-4 md:py-2 text-[10px] md:text-xs">
                <i class="fas fa-rotate-right mr-1"></i>
                Reset
            </button>
        </div>
    </div>
    
    <!-- Guide section -->
    <div class="glass-panel p-3 md:p-5 mb-6">
        <div class="flex items-center gap-2 md:gap-3 mb-2">
            <div class="w-1 h-6 md:w-1 md:h-8 bg-blue-600 rounded-full"></div>
            <p id="guide-text" class="text-blue-600 font-bold text-xs md:text-sm uppercase tracking-wider">
                Vui lòng chọn thí nghiệm
            </p>
        </div>
        <div class="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-100">
            <p id="info-text" class="text-slate-600 text-xs md:text-sm leading-relaxed">
                Hướng dẫn sẽ xuất hiện tại đây.
            </p>
        </div>
    </div>
    
    <!-- Footer space -->
    <div class="footer-space"></div>

<script>
    let currentTab = 1, charge = 0, isDragging = false, dragOffset;
    let ruler, cloth, sphere, scraps = [], audioCtx;
    let scaleFactor = 1;
    // BIẾN MỚI: ghi nhớ trạng thái nhiễm điện của vải
    let clothIsCharged = false; // false = trung hòa, true = đã nhiễm điện dương

    // Audio functions
    function playSfx(freq, type = 'sine') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; 
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.04, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        o.connect(g); 
        g.connect(audioCtx.destination);
        o.start(); 
        o.stop(audioCtx.currentTime + 0.1);
    }

    function setup() {
        const p = document.getElementById('canvas-parent');
        let cnv = createCanvas(p.offsetWidth, p.offsetHeight);
        cnv.parent('canvas-parent');
        
        scaleFactor = min(1.6, width / 330);
        initSim();
    }

    function initSim() {
        charge = 0;
        clothIsCharged = false; // Reset trạng thái vải
        
        let rulerHeight = 160 * scaleFactor;
        let rulerWidth = 40 * scaleFactor;
        let clothWidth = 145 * scaleFactor;
        let clothHeight = 100 * scaleFactor;
        let sphereRadius = 100 * scaleFactor;
        
        ruler = { 
            x: width/2, 
            y: 40 * scaleFactor, 
            w: rulerWidth, 
            h: rulerHeight 
        };
        
        cloth = { 
            x: width/2, 
            y: height * 0.45, 
            w: clothWidth, 
            h: clothHeight 
        };
        
        sphere = { 
            x: width/2, 
            y: height * 0.75, 
            r: sphereRadius, 
            charged: false 
        };
        
        // Giấy vụn
        scraps = [];
        for(let i=0; i<12; i++) {
            scraps.push({ 
                x: random(width/2 - 80 * scaleFactor, width/2 + 80 * scaleFactor), 
                y: height - 40 * scaleFactor, 
                a: random(TWO_PI), 
                stuck: false, 
                ox: 0, 
                oy: 0 
            });
        }
        updateUI();
    }

    function switchTab(t) {
        playSfx(400 + t*100, 'triangle');
        currentTab = t;
        
        document.querySelectorAll('.tab-btn').forEach((btn, index) => {
            if(index + 1 === t) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        initSim();
    }

    function resetSim() { 
        playSfx(200, 'square'); 
        initSim(); 
    }

    function draw() {
        background(255);
        
        // Draw faint grid
        stroke(241, 245, 249);
        strokeWeight(1);
        let gridSize = 35 * scaleFactor;
        for(let i=0; i<width; i+=gridSize) line(i, 0, i, height);
        for(let i=0; i<height; i+=gridSize) line(0, i, width, i);

        if (currentTab === 1) drawFriction();
        else if (currentTab === 2) drawContact();
        else if (currentTab === 3) drawInduction();
        
        drawRuler();
    }

    function drawFriction() {
        // Vải
        push();
        noStroke();
        fill(241, 245, 249);
        rect(cloth.x - cloth.w/2, cloth.y - cloth.h/2, cloth.w, cloth.h, 10 * scaleFactor);
        fill(100, 116, 139);
        textAlign(CENTER);
        textSize(12 * scaleFactor);
        text("VẢI KHÔ", cloth.x, cloth.y + 10 * scaleFactor);
        
        // Dấu + trên vải - HIỂN THỊ VĨNH VIỄN KHI VẢI ĐÃ NHIỄM ĐIỆN
        if (clothIsCharged) {
            fill(239, 68, 68);
            textSize(20 * scaleFactor);
            textStyle(BOLD);
            let spacing = 30 * scaleFactor;
            for(let i=0; i<3; i++) {
                text("+", cloth.x - spacing + i*spacing, cloth.y - 15 * scaleFactor);
            }
        }
        pop();

        // Giấy vụn
        scraps.forEach(s => {
            push();
            if(s.stuck) { 
                s.x = ruler.x + s.ox; 
                s.y = ruler.y + ruler.h + s.oy; 
            }
            else if (charge > 85 && dist(ruler.x, ruler.y + ruler.h, s.x, s.y) < 80 * scaleFactor) {
                s.x = lerp(s.x, ruler.x, 0.15);
                s.y = lerp(s.y, ruler.y + ruler.h, 0.15);
                if(dist(s.x, s.y, ruler.x, ruler.y + ruler.h) < 13 * scaleFactor) { 
                    s.stuck = true; 
                    s.ox = s.x - ruler.x; 
                    s.oy = s.y - (ruler.y + ruler.h);
                    playSfx(1200, 'sine');
                }
            }
            translate(s.x, s.y);
            rotate(s.a);
            fill(100, 116, 139);
            rect(-7 * scaleFactor, -3.5 * scaleFactor, 14 * scaleFactor, 7 * scaleFactor, 2);
            pop();
        });

        // Sạc điện bằng cọ xát
        if(isDragging && dist(ruler.x, ruler.y + ruler.h/2, cloth.x, cloth.y) < 60 * scaleFactor) {
            charge = min(charge + 1.5, 100);
            
            // Khi charge đạt ngưỡng, đánh dấu vải đã nhiễm điện
            if (charge > 20) {
                clothIsCharged = true;
            }
            
            if(frameCount % 8 === 0) playSfx(200 + charge*5, 'sine');
            updateUI();
        }
    }

    function drawContact() {
        // Kiểm tra tiếp xúc
        if(dist(ruler.x, ruler.y + ruler.h, sphere.x, sphere.y) < sphere.r/2 + 8 * scaleFactor) {
            if(!sphere.charged) playSfx(600, 'triangle');
            sphere.charged = true;
        }
        
        // Vẽ quả cầu
        push();
        if(sphere.charged) {
            // Hiệu ứng glow
            drawGlow(sphere.x, sphere.y, sphere.r, color(37, 99, 235, 100));
            fill('#2563eb');
            stroke(255, 80);
            strokeWeight(2.5 * scaleFactor);
            ellipse(sphere.x, sphere.y, sphere.r);
            
            // Dấu -
            fill(255);
            textAlign(CENTER, CENTER);
            textStyle(BOLD);
            textSize(24 * scaleFactor);
            let offset = 22 * scaleFactor;
            text("-", sphere.x, sphere.y);
            text("-", sphere.x - offset, sphere.y - offset);
            text("-", sphere.x + offset, sphere.y - offset);
            text("-", sphere.x - offset, sphere.y + offset);
            text("-", sphere.x + offset, sphere.y + offset);
        } else {
            fill('#f8fafc');
            stroke('#cbd5e1');
            strokeWeight(2.5 * scaleFactor);
            ellipse(sphere.x, sphere.y, sphere.r);
        }
        pop();
    }

    function drawInduction() {
        let tipX = ruler.x, tipY = ruler.y + ruler.h;
        let d = dist(tipX, tipY, sphere.x, sphere.y);
        let angle = atan2(tipY - sphere.y, tipX - sphere.x);
        let str = map(d, 45 * scaleFactor, 200 * scaleFactor, 1, 0, true);
        
        push();
        // Quả cầu
        fill('#f8fafc');
        stroke('#e2e8f0');
        ellipse(sphere.x, sphere.y, sphere.r);
        
        if(str > 0.05) {
            noStroke();
            // Phía dương (đỏ)
            fill(239, 68, 68, str * 220);
            arc(sphere.x, sphere.y, sphere.r, sphere.r, angle - HALF_PI, angle + HALF_PI);
            
            // Phía âm (xanh)
            fill(37, 99, 235, str * 220);
            arc(sphere.x, sphere.y, sphere.r, sphere.r, angle + HALF_PI, angle + 3*HALF_PI);
            
            // Nhãn
            fill(255);
            textSize(22 * scaleFactor);
            textAlign(CENTER, CENTER);
            let labelOffset = 30 * scaleFactor;
            text("+", sphere.x + cos(angle) * labelOffset, sphere.y + sin(angle) * labelOffset);
            text("-", sphere.x - cos(angle) * labelOffset, sphere.y - sin(angle) * labelOffset);
        }
        pop();
    }

    function drawRuler() {
        let c = (currentTab === 1) ? charge : 100;
        
        push();
        // Hiệu ứng glow khi có điện
        if(c > 20) {
            drawGlow(ruler.x, ruler.y + ruler.h/2, ruler.h, color(37, 99, 235, 120), true);
        }
        
        // Thân thước
        fill(c > 20 ? '#2563eb' : '#94a3b8');
        noStroke();
        rect(ruler.x - ruler.w/2, ruler.y, ruler.w, ruler.h, 8 * scaleFactor);
        
        // Dấu - khi có điện
        if(c > 30) {
            fill(255);
            textAlign(CENTER);
            textStyle(BOLD);
            textSize(18 * scaleFactor);
            let step = ruler.h / 5;
            for(let i=1; i<=4; i++) {
                text("-", ruler.x, ruler.y + i * step);
            }
        }
        pop();
    }

    function drawGlow(x, y, r, col, isRect = false) {
        push();
        for(let i=10; i>0; i--) {
            fill(red(col), green(col), blue(col), 3);
            if(isRect) {
                rect(x - ruler.w/2 - i, ruler.y - i, ruler.w + i*2, ruler.h + i*2, 8 * scaleFactor + i);
            } else {
                ellipse(x, y, r + i*5 * scaleFactor);
            }
        }
        pop();
    }

    function updateUI() {
        // Cập nhật thanh điện tích
        let chargePercent = (currentTab === 1) ? charge : 100;
        document.getElementById('charge-fill').style.width = chargePercent + "%";
        document.getElementById('charge-percent').innerText = chargePercent + "%";
        
        // Cập nhật trạng thái
        const led = document.getElementById('status-led');
        const statusText = document.getElementById('status-text');
        
        if(charge > 80 || currentTab > 1) { 
            led.classList.add('active');
            statusText.innerText = "ĐÃ NHIỄM ĐIỆN";
        } else {
            led.classList.remove('active');
            statusText.innerText = "TRUNG HÒA";
        }

        // Cập nhật hướng dẫn
        const guideText = document.getElementById('guide-text');
        const infoText = document.getElementById('info-text');

        if(currentTab === 1) {
            if (charge < 80) {
                guideText.innerText = "👉 CỌ XÁT THƯỚC VÀO VẢI";
            } else {
                guideText.innerText = "✅ THƯỚC ĐÃ NHIỄM ĐIỆN";
            }
            infoText.innerText = "Khi cọ xát, electron từ vải chuyển sang thước nhựa, làm thước thừa electron (nhiễm điện âm).";
        } else if(currentTab === 2) {
            guideText.innerText = "👉 CHẠM ĐẦU THƯỚC VÀO QUẢ CẦU";
            infoText.innerText = "Tiếp xúc trực tiếp cho phép electron di chuyển sang vật dẫn khác, làm cả hai nhiễm điện cùng dấu.";
        } else {
            guideText.innerText = "👉 DI CHUYỂN THƯỚC QUANH QUẢ CẦU";
            infoText.innerText = "Hiện tượng hưởng ứng: Các điện tích trong quả cầu bị phân tách do tác động của thước nhiễm điện.";
        }
    }

    // Mouse/Touch handlers
    function handleStart(x, y) {
        if(x > ruler.x - ruler.w && x < ruler.x + ruler.w && 
           y > ruler.y - 12 && y < ruler.y + ruler.h + 25) {
            isDragging = true;
            dragOffset = createVector(ruler.x - x, ruler.y - y);
        }
    }
    
    function handleMove(x, y) { 
        if(isDragging) { 
            ruler.x = constrain(x + dragOffset.x, ruler.w, width - ruler.w); 
            ruler.y = constrain(y + dragOffset.y, 12, height - ruler.h - 25); 
        } 
    }

    function mousePressed() { handleStart(mouseX, mouseY); }
    function mouseDragged() { handleMove(mouseX, mouseY); }
    function mouseReleased() { isDragging = false; }
    
    function touchStarted() { 
        if(touches.length > 0) handleStart(touches[0].x, touches[0].y); 
        return false; 
    }
    
    function touchMoved() { 
        if(touches.length > 0) handleMove(touches[0].x, touches[0].y); 
        return false; 
    }
    
    function touchEnded() { 
        isDragging = false; 
        return false; 
    }
    
    function windowResized() { 
        const p = document.getElementById('canvas-parent'); 
        resizeCanvas(p.offsetWidth, p.offsetHeight); 
        scaleFactor = min(1.6, width / 330);
        initSim(); 
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('tab1').addEventListener('click', (e) => { e.preventDefault(); switchTab(1); });
        document.getElementById('tab1').addEventListener('touchstart', (e) => { e.preventDefault(); switchTab(1); });

        document.getElementById('tab2').addEventListener('click', (e) => { e.preventDefault(); switchTab(2); });
        document.getElementById('tab2').addEventListener('touchstart', (e) => { e.preventDefault(); switchTab(2); });

        document.getElementById('tab3').addEventListener('click', (e) => { e.preventDefault(); switchTab(3); });
        document.getElementById('tab3').addEventListener('touchstart', (e) => { e.preventDefault(); switchTab(3); });

        document.getElementById('resetBtn').addEventListener('click', (e) => { e.preventDefault(); resetSim(); });
        document.getElementById('resetBtn').addEventListener('touchstart', (e) => { e.preventDefault(); resetSim(); });
    });
</script>
</body>
</html>
